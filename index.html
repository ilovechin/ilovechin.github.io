<!doctype html><html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>锦的创作资源导航</title>
<style>
:root{--bg:#f6f3ec;--bg2:#f1ece3;--card:#fffdfa;--text:#2e2923;--muted:#7b6f62;--line:#e7ddcf;--accent:#b48653;--shadow:0 14px 40px rgba(74,56,34,.10)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
.container{max-width:1140px;margin:0 auto;padding:24px 18px 64px}.hero{border:1px solid var(--line);border-radius:24px;background:#fff8;box-shadow:var(--shadow);padding:28px}
h1{margin:0;font-size:36px}.sub{margin-top:8px;color:var(--muted)}.intro{margin-top:6px;color:var(--muted)}
.section{margin-top:24px}.section h2{font-size:20px;margin:0 0 10px}.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 6px 18px rgba(61,45,28,.06)}
.card h3{margin:0 0 6px}.card p{margin:0 0 10px;color:var(--muted);line-height:1.55}.btn{display:inline-block;text-decoration:none;border:1px solid #d9c5ab;background:#fff;padding:8px 12px;border-radius:10px;color:#6a4929;font-weight:600}.btn.muted{opacity:.6}
.work .cover{height:140px;background:#f4ede2;border:1px dashed #dfcfba;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden}.work img{width:100%;height:100%;object-fit:cover}.placeholder{color:#9a8d7f;font-size:13px}
ul{margin:0;padding-left:18px;color:#6d6257;line-height:1.8}.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}.item .t{font-size:12px;color:#877a6d}.item .v{margin-top:5px;font-weight:700}
.private{display:grid;gap:10px}.input{display:flex;gap:8px}.input input{flex:1;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}.err{color:#b02a2a}
footer{margin-top:24px;color:#8a7b69;font-size:13px}
</style></head><body><main class="container">
<section class="hero"><h1 id="title"></h1><div id="subtitle" class="sub"></div><div id="intro" class="intro"></div></section>
<section class="section"><h2>账号入口</h2><div id="links" class="grid"></div></section>
<section class="section"><h2>作品墙</h2><div id="portfolio" class="grid"></div></section>
<section class="section"><h2>资源库</h2><div id="resources" class="grid"></div></section>
<section class="section"><h2>联系方式</h2><div id="contacts" class="kpi"></div></section>
<section class="section"><h2 id="privateHint">私密区</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="输入密码访问私密资料"/><button id="unlockBtn" class="btn">解锁</button></div><div id="privateContent" class="grid"></div></div></section>
<footer>© 2026 锦的创作资源导航</footer></main>
<script src="./assets/content.js"></script><script src="./assets/app.js"></script>
</body></html>
