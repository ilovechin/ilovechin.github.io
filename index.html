<!doctype html><html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>锦的创作资源导航</title>
<style>
:root{
  --bg:#0d0d0d;--bg2:#141414;--card:#171717;--card2:#1f1f1f;
  --text:#f5f5f5;--muted:#b6b6b6;--line:#2a2a2a;--accent:#ffffff;
  --shadow:0 22px 48px rgba(0,0,0,.45)
}
*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial;background:radial-gradient(900px 500px at 15% -20%,#1e1e1e 0%,transparent 60%),radial-gradient(800px 400px at 90% 0%,#1b1b1b 0%,transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2))}
.container{max-width:1140px;margin:0 auto;padding:30px 18px 68px}
.hero{border:1px solid #2e2e2e;border-radius:28px;padding:36px 30px;background:linear-gradient(155deg,#161616,#101010);box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.03) 40%,transparent 80%);pointer-events:none}
h1{margin:0;font-family:"Times New Roman","Georgia","PingFang SC",serif;font-size:46px;letter-spacing:1.4px;font-weight:700}.sub{margin-top:10px;color:#cfcfcf}.intro{margin-top:8px;color:#a8a8a8;line-height:1.85}.quoteTop{margin-top:12px;font-style:italic;color:#f1f1f1}
.section{margin-top:30px}.section h2{margin:0 0 12px;font-size:22px;font-family:"Times New Roman","Georgia","PingFang SC",serif;letter-spacing:.5px;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.card{background:linear-gradient(180deg,var(--card),#131313);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 10px 28px rgba(0,0,0,.35);transition:.24s}
.card:hover{transform:translateY(-2px);border-color:#3c3c3c}
.card h3{margin:0 0 7px;color:#fff}.card p{margin:0 0 10px;color:var(--muted);line-height:1.6}
.btn{display:inline-block;text-decoration:none;border:1px solid #5b5b5b;background:linear-gradient(180deg,#2a2a2a,#1f1f1f);padding:8px 12px;border-radius:11px;color:#fff;font-weight:600}.btn.muted{opacity:.55}
.work .cover{height:150px;background:linear-gradient(145deg,#222,#151515);border:1px dashed #444;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden}.work img{width:100%;height:100%;object-fit:cover}.placeholder{color:#8a8a8a;font-size:13px}.meta{font-size:12px;color:#999}
.step .badge{display:inline-block;font-size:12px;border:1px solid #555;border-radius:999px;padding:2px 8px;color:#d7d7d7;margin-bottom:8px}
ul{margin:0;padding-left:18px;color:#bdbdbd;line-height:1.8}
.quote h4{margin:8px 0 0;color:#dfdfdf;font-size:13px}
details summary{cursor:pointer;font-weight:600;margin-bottom:8px;color:#fff}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.item{background:linear-gradient(180deg,var(--card2),#131313);border:1px solid var(--line);border-radius:14px;padding:12px}.item .t{font-size:12px;color:#9f9f9f}.item .v{margin-top:5px;font-weight:700;color:#fff}
.cta{border:1px solid #3a3a3a;border-radius:18px;background:linear-gradient(145deg,#1d1d1d,#131313);padding:20px}
.private{display:grid;gap:10px}.input{display:flex;gap:8px}.input input{flex:1;padding:10px;border:1px solid #3a3a3a;border-radius:10px;background:#101010;color:#fff}.err{color:#ff7d7d}
footer{margin-top:24px;color:#8f8f8f;font-size:13px}
@media (max-width:640px){h1{font-size:34px}.hero{padding:24px}}
</style></head><body><main class="container">
<section class="hero"><h1 id="title"></h1><div id="subtitle" class="sub"></div><div id="intro" class="intro"></div><div id="quote" class="quoteTop"></div></section>
<section class="section"><h2>账号入口</h2><div id="links" class="grid"></div></section>
<section class="section"><h2>作品墙</h2><div id="portfolio" class="grid"></div></section>
<section class="section"><h2>服务能力</h2><div id="services" class="grid"></div></section>
<section class="section"><h2>创作流程</h2><div id="process" class="grid"></div></section>
<section class="section"><h2>资源库</h2><div id="resources" class="grid"></div></section>
<section class="section"><h2>合作反馈</h2><div id="testimonials" class="grid"></div></section>
<section class="section"><h2>常见问题</h2><div id="faq" class="grid"></div></section>
<section class="section"><h2>联系方式</h2><div id="contacts" class="kpi"></div></section>
<section class="section"><div class="cta"><h2 id="ctaTitle"></h2><p id="ctaText"></p></div></section>
<section class="section"><h2 id="privateHint">私密区</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="输入密码访问私密资料"/><button id="unlockBtn" class="btn">解锁</button></div><div id="privateContent" class="grid"></div></div></section>
<footer>© 2026 锦的创作资源导航</footer></main>
<script src="./assets/content.js"></script><script src="./assets/app.js"></script>
</body></html>
