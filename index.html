<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>锦 · Personal Site</title>
<style>
:root{--bg:#0e0e0f;--bg2:#17181b;--card:#141518;--line:#2a2c31;--text:#f5f7fa;--muted:#9aa3af;--accent:#e8f0ff;--w:1080px;--fxOpacity:.65;--cloudOpacity:.26}
[data-theme="light"]{--bg:#f6f7fa;--bg2:#eef1f5;--card:#ffffff;--line:#dce2ea;--text:#111827;--muted:#5b6472;--accent:#0f172a;--fxOpacity:.35;--cloudOpacity:.15}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC",Arial;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit}.container{max-width:var(--w);margin:0 auto;padding:0 22px}
#fx-cloud,#fx-particles{position:fixed;inset:0;pointer-events:none;z-index:0}#fx-cloud{opacity:var(--cloudOpacity);mix-blend-mode:screen}#fx-particles{opacity:var(--fxOpacity);mix-blend-mode:screen}
body > *:not(#fx-cloud):not(#fx-particles){position:relative;z-index:1}
nav{position:sticky;top:0;background:color-mix(in oklab, var(--bg), transparent 26%);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:20}
.nav{height:64px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:15px;letter-spacing:.6px}.right{display:flex;align-items:center;gap:14px}.links{display:flex;gap:18px}.links a{font-size:13px;color:var(--muted)}.links a:hover{color:var(--text)}
.ctrls{display:flex;gap:8px}.ctrl{border:1px solid var(--line);background:transparent;color:var(--text);font-size:12px;padding:7px 10px;border-radius:8px;cursor:pointer}.ctrl:hover{border-color:var(--accent)}
.hero{padding:94px 0 56px}.hero h1{font-size:60px;line-height:1;letter-spacing:-1.2px;margin:0 0 16px;font-weight:760}.hero p{margin:0;color:var(--muted);max-width:760px}.hero .q{margin-top:10px;font-style:italic;color:color-mix(in oklab, var(--text), var(--muted) 30%)}
.section{padding:56px 0;border-top:1px solid color-mix(in oklab, var(--line), transparent 20%)}.section h2{font-size:22px;margin:0 0 16px;font-weight:640;letter-spacing:.2px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:linear-gradient(180deg,var(--card),color-mix(in oklab, var(--card), #000 6%));border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.14)}
.card h3{margin:0 0 6px;font-size:16px}.card p{margin:0 0 10px;font-size:14px;color:var(--muted);line-height:1.6}
.btn{display:inline-block;border:1px solid color-mix(in oklab, var(--line), #fff 10%);padding:7px 11px;border-radius:8px;font-size:12px}.btn:hover{border-color:var(--accent)}.btn.muted{opacity:.55;cursor:not-allowed}
.work .cover{height:140px;background:linear-gradient(145deg,color-mix(in oklab,var(--card),#000 6%),color-mix(in oklab,var(--card),#fff 2%));border:1px dashed color-mix(in oklab,var(--line),#fff 8%);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:12px;margin-bottom:8px}
.meta{font-size:12px;color:color-mix(in oklab,var(--muted),#fff 4%);margin-bottom:8px}.step .badge{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:2px 7px;color:var(--muted);display:inline-block;margin-bottom:8px}
ul{margin:0;padding-left:18px}li{color:var(--muted);font-size:14px;line-height:1.8}.quote-card h4{margin:8px 0 0;font-size:12px;color:color-mix(in oklab,var(--muted),#fff 6%)}.faq summary{cursor:pointer;font-weight:600}.faq p{margin-top:8px}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.item{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:12px}.item .t{font-size:12px;color:var(--muted)}.item .v{margin-top:4px}
.cta{border:1px solid var(--line);border-radius:10px;background:linear-gradient(145deg,color-mix(in oklab,var(--card),#000 3%),color-mix(in oklab,var(--card),#fff 2%));padding:16px}
.private .input{display:flex;gap:8px}.private input{flex:1;background:color-mix(in oklab,var(--card),#000 7%);border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--text)}.err{color:#ff7e7e}
footer{padding:24px 0;color:var(--muted);font-size:12px;text-align:center;border-top:1px solid var(--line)}
@media (max-width:760px){.hero h1{font-size:40px}.links{display:none}.ctrl{padding:6px 8px}}
</style>
</head>
<body>
<canvas id="fx-cloud" aria-hidden="true"></canvas>
<canvas id="fx-particles" aria-hidden="true"></canvas>
<nav>
  <div class="container nav">
    <div class="logo">锦 · Personal Site</div>
    <div class="right">
      <div class="links">
        <a href="#linksSec">Intro</a><a href="#portfolioSec">Works</a><a href="#faqSec">About</a><a href="#contactSec">Contact</a>
      </div>
      <div class="ctrls">
        <button class="ctrl" id="themeBtn">Theme</button>
        <button class="ctrl" id="fxBtn">FX On</button>
      </div>
    </div>
  </div>
</nav>
<header class="hero"><div class="container"><h1 id="title"></h1><p id="subtitle"></p><p id="intro" style="margin-top:6px"></p><p id="quote" class="q"></p></div></header>
<section id="linksSec" class="section"><div class="container"><h2>Links</h2><div id="links" class="grid"></div></div></section>
<section id="portfolioSec" class="section"><div class="container"><h2>Selected Works</h2><div id="portfolio" class="grid"></div></div></section>
<section id="servicesSec" class="section"><div class="container"><h2>Creative Focus</h2><div id="services" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Process</h2><div id="process" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Resource Notes</h2><div id="resources" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Manifesto</h2><div id="testimonials" class="grid"></div></div></section>
<section id="faqSec" class="section"><div class="container"><h2>FAQ</h2><div id="faq" class="grid"></div></div></section>
<section id="contactSec" class="section"><div class="container"><h2>Contact</h2><div id="contacts" class="kpi"></div></div></section>
<section class="section"><div class="container"><div class="cta"><h2 id="ctaTitle"></h2><p id="ctaText" style="margin:8px 0 0;color:var(--muted)"></p></div></div></section>
<section class="section"><div class="container"><h2 id="privateHint">Private</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="Password" /><button id="unlockBtn" class="btn">Unlock</button></div><div id="privateContent" class="grid" style="margin-top:10px"></div></div></div></section>
<footer>© 2026 Jin — Personal Portfolio</footer>
<script src="./assets/content.js"></script>
<script src="./assets/app.js"></script>
<script>
(function(){
  const root=document.documentElement;
  const themeBtn=document.getElementById('themeBtn');
  const fxBtn=document.getElementById('fxBtn');
  const savedTheme=localStorage.getItem('theme')||'dark';
  const savedFx=localStorage.getItem('fx')||'on';
  root.setAttribute('data-theme',savedTheme);

  function setFx(on){
    document.getElementById('fx-cloud').style.display = on ? 'block' : 'none';
    document.getElementById('fx-particles').style.display = on ? 'block' : 'none';
    fxBtn.textContent = on ? 'FX On' : 'FX Off';
    localStorage.setItem('fx', on ? 'on' : 'off');
  }

  themeBtn.addEventListener('click',()=>{
    const next=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',next); localStorage.setItem('theme',next);
  });
  fxBtn.addEventListener('click',()=> setFx(fxBtn.textContent!=='FX On'));
  setFx(savedFx==='on');
})();

(function(){
  const cloud=document.getElementById('fx-cloud');
  const pcan=document.getElementById('fx-particles');
  const cctx=cloud.getContext('2d',{alpha:true});
  const pctx=pcan.getContext('2d',{alpha:true});
  let w=0,h=0,dpr=Math.min(window.devicePixelRatio||1,2),t=0;
  const mouse={x:-9999,y:-9999};
  const N=88; const P=[];

  function rand(a,b){return a+Math.random()*(b-a)}
  function resize(){
    w=innerWidth; h=innerHeight;
    for(const cnv of [cloud,pcan]){
      cnv.width=Math.floor(w*dpr); cnv.height=Math.floor(h*dpr);
      cnv.style.width=w+'px'; cnv.style.height=h+'px';
    }
    cctx.setTransform(dpr,0,0,dpr,0,0);
    pctx.setTransform(dpr,0,0,dpr,0,0);
    if(!P.length){for(let i=0;i<N;i++)P.push({x:rand(0,w),y:rand(0,h),vx:rand(-.28,.28),vy:rand(-.28,.28),r:rand(.7,1.9)});}
  }

  function drawCloud(){
    cctx.clearRect(0,0,w,h);
    t += 0.0018;
    const g1=cctx.createRadialGradient(w*(0.25+Math.sin(t)*0.05),h*(0.35+Math.cos(t*1.2)*0.06),20,w*0.25,h*0.35,Math.max(w,h)*0.55);
    g1.addColorStop(0,'rgba(180,210,255,0.22)'); g1.addColorStop(1,'rgba(180,210,255,0)');
    cctx.fillStyle=g1; cctx.fillRect(0,0,w,h);

    const g2=cctx.createRadialGradient(w*(0.72+Math.cos(t*0.8)*0.04),h*(0.52+Math.sin(t)*0.05),10,w*0.72,h*0.52,Math.max(w,h)*0.52);
    g2.addColorStop(0,'rgba(255,255,255,0.20)'); g2.addColorStop(1,'rgba(255,255,255,0)');
    cctx.fillStyle=g2; cctx.fillRect(0,0,w,h);

    const g3=cctx.createRadialGradient(w*(0.5+Math.sin(t*0.6)*0.03),h*(0.7+Math.cos(t*0.7)*0.03),10,w*0.5,h*0.7,Math.max(w,h)*0.45);
    g3.addColorStop(0,'rgba(190,170,255,0.14)'); g3.addColorStop(1,'rgba(190,170,255,0)');
    cctx.fillStyle=g3; cctx.fillRect(0,0,w,h);
  }

  function drawParticles(){
    pctx.clearRect(0,0,w,h);
    for(const p of P){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
      const dx=mouse.x-p.x,dy=mouse.y-p.y,md=Math.hypot(dx,dy);
      if(md<160){p.x-=dx*0.0011;p.y-=dy*0.0011;}
      pctx.beginPath(); pctx.fillStyle='rgba(255,255,255,0.80)'; pctx.arc(p.x,p.y,p.r,0,Math.PI*2); pctx.fill();
    }
    for(let i=0;i<P.length;i++) for(let j=i+1;j<P.length;j++){
      const a=P[i],b=P[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<145){
        const o=(1-d/145)*0.24;
        pctx.strokeStyle=`rgba(180,210,255,${o})`; pctx.lineWidth=0.85;
        pctx.beginPath(); pctx.moveTo(a.x,a.y); pctx.lineTo(b.x,b.y); pctx.stroke();
      }
    }
  }

  function raf(){drawCloud(); drawParticles(); requestAnimationFrame(raf);} 
  addEventListener('resize',resize);
  addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
  resize(); raf();
})();
</script>
</body>
</html>
