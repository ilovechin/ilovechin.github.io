<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吴东锦 | 艺术工作者</title>
  <style>
    :root{
      --bg:#ececec;
      --text:#111;
      --muted:#7a7a7a;
      --line:#d4d4d4;
      --accent:#b79b6a;
      --card:#f7f7f7;
      --w:1080px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:"PingFang SC","Noto Sans SC",Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:var(--w);margin:0 auto;padding:0 24px}

    header{padding:34px 0 0}
    .nav{display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:18px;font-weight:600;letter-spacing:.5px}
    .links{display:flex;gap:28px}
    .links a{font-size:18px;color:#8a8a8a;text-decoration:none}
    .links a:hover{color:#111}

    .hero{padding:120px 0 90px}
    .kicker{color:var(--accent);font-family:Georgia,serif;font-size:42px;margin:0 0 10px}
    h1{font-family:Georgia,"Times New Roman",serif;font-size:92px;line-height:.95;margin:0 0 18px;letter-spacing:-2px}
    .sub{font-size:28px;color:#3b3b3b;margin:0 0 8px}
    .meta{font-size:18px;color:var(--muted);margin:0}

    section{padding:72px 0;border-top:1px solid var(--line)}
    h2{margin:0 0 24px;font-size:34px;font-family:Georgia,serif}
    .about p{max-width:820px;font-size:20px;line-height:1.9;color:#3f3f3f;margin:0 0 12px}

    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .card{background:var(--card);border:1px solid var(--line);padding:24px;min-height:150px}
    .card h3{margin:0 0 10px;font-size:24px}
    .card p{margin:0;color:#555;line-height:1.8;font-size:16px}

    .news{background:var(--card);border:1px solid var(--line);padding:24px}
    .news .date{font-size:15px;color:var(--muted);margin-bottom:8px}
    .news .title{font-size:30px;margin:0 0 8px;font-family:Georgia,serif}
    .news .desc{font-size:18px;color:#4b4b4b;line-height:1.8;margin:0}

    .contact-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .contact-item{background:var(--card);border:1px solid var(--line);padding:14px 16px}
    .contact-item .k{font-size:13px;color:var(--muted)}
    .contact-item .v{font-size:18px;margin-top:5px}

    footer{padding:26px 0 40px;color:#777;font-size:14px}

    @media (max-width: 820px){
      .links{gap:14px}
      .links a{font-size:16px}
      .hero{padding:80px 0 70px}
      .kicker{font-size:28px}
      h1{font-size:60px}
      .sub{font-size:22px}
      .about p{font-size:17px}
      .grid,.contact-list{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="logo">吴东锦</div>
      <nav class="links">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#works">Portfolios</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="home" class="hero container">
      <p class="kicker">artist</p>
      <h1 id="heroName"></h1>
      <p class="sub" id="heroRole"></p>
      <p class="meta" id="heroMeta"></p>
    </section>

    <section id="about">
      <div class="container about">
        <h2>About</h2>
        <p id="aboutText1"></p>
        <p id="aboutText2"></p>
      </div>
    </section>

    <section id="works">
      <div class="container">
        <h2>Portfolios</h2>
        <div id="worksGrid" class="grid"></div>
      </div>
    </section>

    <section id="news">
      <div class="container">
        <h2>Recent Exhibition News</h2>
        <article class="news">
          <div class="date" id="newsDate"></div>
          <h3 class="title" id="newsTitle"></h3>
          <p class="desc" id="newsDesc"></p>
        </article>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <h2>Contact</h2>
        <div id="contactList" class="contact-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">© 2026 吴东锦 · 艺术工作者</div>
  </footer>

  <script src="./assets/content.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
