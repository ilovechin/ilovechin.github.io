<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>锦 · Personal Site</title>
<style>
:root{--bg:#111;--bg2:#1b1b1b;--card:#171717;--line:#2b2b2b;--text:#f3f3f3;--muted:#9e9e9e;--accent:#fff;--w:1060px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC",Arial;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
a{text-decoration:none;color:inherit}.container{max-width:var(--w);margin:0 auto;padding:0 22px}
nav{position:sticky;top:0;background:rgba(17,17,17,.75);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:10}
.nav{height:64px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:15px;letter-spacing:.5px}.links{display:flex;gap:18px}.links a{font-size:13px;color:var(--muted)}.links a:hover{color:#fff}
.hero{padding:92px 0 54px}.hero h1{font-size:58px;line-height:1;letter-spacing:-1px;margin:0 0 16px;font-weight:700}.hero p{margin:0;color:var(--muted);max-width:700px}.hero .q{margin-top:10px;font-style:italic;color:#c9c9c9}
.section{padding:56px 0;border-top:1px solid #1f1f1f}.section h2{font-size:22px;margin:0 0 16px;font-weight:600;letter-spacing:.2px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
.card h3{margin:0 0 6px;font-size:16px}.card p{margin:0 0 10px;font-size:14px;color:var(--muted);line-height:1.6}
.btn{display:inline-block;border:1px solid #3a3a3a;padding:7px 11px;border-radius:8px;font-size:12px}.btn:hover{border-color:#fff}.btn.muted{opacity:.5;cursor:not-allowed}
.work .cover{height:140px;background:#101010;border:1px dashed #333;border-radius:8px;display:grid;place-items:center;color:#757575;font-size:12px;margin-bottom:8px}
.meta{font-size:12px;color:#8b8b8b;margin-bottom:8px}
.step .badge{font-size:11px;border:1px solid #3b3b3b;border-radius:999px;padding:2px 7px;color:#9d9d9d;display:inline-block;margin-bottom:8px}
ul{margin:0;padding-left:18px}li{color:var(--muted);font-size:14px;line-height:1.8}
.quote-card h4{margin:8px 0 0;font-size:12px;color:#8c8c8c}.faq summary{cursor:pointer;font-weight:600}.faq p{margin-top:8px}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.item{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:12px}.item .t{font-size:12px;color:#8f8f8f}.item .v{margin-top:4px}
.cta{border:1px solid #343434;border-radius:10px;background:#151515;padding:16px}
.private .input{display:flex;gap:8px}.private input{flex:1;background:#0f0f0f;border:1px solid #343434;border-radius:8px;padding:10px;color:#fff}.err{color:#ff7e7e}
footer{padding:24px 0;color:#888;font-size:12px;text-align:center;border-top:1px solid #1f1f1f}
@media (max-width:760px){.hero h1{font-size:40px}.links{display:none}}

#fx-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.42;mix-blend-mode:screen}
body > *:not(#fx-canvas){position:relative;z-index:1}

</style>
</head>
<body>
<canvas id="fx-canvas" aria-hidden="true"></canvas>
<nav><div class="container nav"><div class="logo">锦 · Personal Site</div><div class="links"><a href="#linksSec">Intro</a><a href="#portfolioSec">Works</a><a href="#faqSec">About</a><a href="#contactSec">Contact</a></div></div></nav>
<header class="hero"><div class="container"><h1 id="title"></h1><p id="subtitle"></p><p id="intro" style="margin-top:6px"></p><p id="quote" class="q"></p></div></header>
<section id="linksSec" class="section"><div class="container"><h2>Links</h2><div id="links" class="grid"></div></div></section>
<section id="portfolioSec" class="section"><div class="container"><h2>Selected Works</h2><div id="portfolio" class="grid"></div></div></section>
<section id="servicesSec" class="section"><div class="container"><h2>Creative Focus</h2><div id="services" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Process</h2><div id="process" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Resource Notes</h2><div id="resources" class="grid"></div></div></section>
<section class="section"><div class="container"><h2>Manifesto</h2><div id="testimonials" class="grid"></div></div></section>
<section id="faqSec" class="section"><div class="container"><h2>FAQ</h2><div id="faq" class="grid"></div></div></section>
<section id="contactSec" class="section"><div class="container"><h2>Contact</h2><div id="contacts" class="kpi"></div></div></section>
<section class="section"><div class="container"><div class="cta"><h2 id="ctaTitle"></h2><p id="ctaText" style="margin:8px 0 0;color:#b0b0b0"></p></div></div></section>
<section class="section"><div class="container"><h2 id="privateHint">Private</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="Password" /><button id="unlockBtn" class="btn">Unlock</button></div><div id="privateContent" class="grid" style="margin-top:10px"></div></div></div></section>
<footer>© 2026 Jin — Personal Portfolio</footer>
<script src="./assets/content.js"></script>
<script src="./assets/app.js"></script>

<script>
(function(){
  const c=document.getElementById('fx-canvas');
  if(!c) return;
  const ctx=c.getContext('2d',{alpha:true});
  let w=0,h=0,dpr=Math.min(window.devicePixelRatio||1,2);
  const mouse={x:-9999,y:-9999};
  const N=70;
  const P=[];

  function resize(){
    w=window.innerWidth; h=window.innerHeight;
    c.width=Math.floor(w*dpr); c.height=Math.floor(h*dpr);
    c.style.width=w+'px'; c.style.height=h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function rand(a,b){return a+Math.random()*(b-a)}
  function init(){
    P.length=0;
    for(let i=0;i<N;i++) P.push({x:rand(0,w),y:rand(0,h),vx:rand(-.22,.22),vy:rand(-.22,.22),r:rand(.6,1.8)});
  }

  function step(){
    ctx.clearRect(0,0,w,h);

    for(const p of P){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;

      const dx=mouse.x-p.x, dy=mouse.y-p.y;
      const md=Math.hypot(dx,dy);
      if(md<140){ p.x-=dx*0.0009; p.y-=dy*0.0009; }

      ctx.beginPath();
      ctx.fillStyle='rgba(255,255,255,0.72)';
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    }

    for(let i=0;i<P.length;i++){
      for(let j=i+1;j<P.length;j++){
        const a=P[i],b=P[j];
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d<120){
          const o=(1-d/120)*0.22;
          ctx.strokeStyle=`rgba(200,220,255,${o})`;
          ctx.lineWidth=0.8;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }

    requestAnimationFrame(step);
  }

  window.addEventListener('resize',()=>{resize();init();});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
  resize(); init(); step();
})();
</script>

</body></html>
