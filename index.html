<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>锦的创作资源导航</title>
  <style>
    :root {
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --radius-md: 16px;
      --container-width: 1024px;
      --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.82);
      --bg-hover: #f1f5f9;

      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-invert: #ffffff;

      --primary: #2563eb;
      --primary-glow: rgba(37, 99, 235, 0.2);

      --border-light: rgba(0, 0, 0, 0.06);
      --shadow-card: 0 4px 10px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 18px 28px rgba(0, 0, 0, 0.12);

      --gradient-title: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      --decoration-blob: #e2e8f0;
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-glass: rgba(15, 23, 42, 0.8);
      --bg-hover: #334155;

      --text-main: #f1f5f9;
      --text-muted: #94a3b8;

      --primary: #60a5fa;
      --primary-glow: rgba(96, 165, 250, 0.25);

      --border-light: rgba(255, 255, 255, 0.08);
      --shadow-card: 0 6px 12px rgba(0, 0, 0, 0.35);
      --shadow-hover: 0 20px 25px rgba(0, 0, 0, 0.5), 0 0 20px rgba(96, 165, 250, 0.12);

      --gradient-title: linear-gradient(135deg, #f8fafc 0%, #60a5fa 100%);
      --decoration-blob: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-main);
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.6;
      transition: background-color 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { text-decoration: none; color: inherit; transition: var(--transition-base); }

    .container { max-width: var(--container-width); margin: 0 auto; padding: 0 24px; }
    .section-padding { padding: 78px 0; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
    }
    .nav-container {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 1.18rem;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    .nav-actions { display: flex; align-items: center; gap: 20px; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      font-size: 0.92rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .nav-links a:hover { color: var(--primary); }

    .control-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      transition: var(--transition-base);
    }
    .control-btn:hover {
      background: var(--bg-hover);
      border-color: var(--primary);
      color: var(--primary);
    }

    .intro {
      padding: 100px 0 56px;
      position: relative;
      text-align: center;
    }
    .bg-decoration {
      position: absolute;
      top: -50%; left: 50%; transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, var(--decoration-blob) 0%, transparent 70%);
      opacity: .52;
      z-index: -1;
      pointer-events: none;
    }
    .avatar-container { position: relative; width: 140px; margin: 0 auto 22px; }
    .avatar {
      width: 140px; height: 140px; border-radius: 50%; object-fit: cover;
      border: 4px solid var(--bg-card);
      background: #111;
      position: relative; z-index: 2;
    }
    .avatar-glow {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--primary);
      filter: blur(25px); opacity: .42;
      z-index: 1;
      transform: scale(0.9);
    }
    .gradient-text {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: var(--gradient-title);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }
    .subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 760px;
      margin: 0 auto;
    }
    .quote-top {
      margin-top: 8px;
      color: var(--text-muted);
      font-style: italic;
    }

    h2 {
      font-size: 1.85rem;
      margin-bottom: 14px;
      letter-spacing: -.2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 14px;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition-base), box-shadow var(--transition-base), border-color var(--transition-base);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-glow);
    }
    .card h3 { margin-bottom: 6px; font-size: 1.05rem; }
    .card p { color: var(--text-muted); font-size: .92rem; margin-bottom: 10px; }

    .btn {
      display: inline-block;
      border: 1px solid var(--border-light);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-main);
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn.muted { opacity: .55; cursor: not-allowed; }

    .work .cover {
      height: 142px;
      margin-bottom: 9px;
      border-radius: 10px;
      border: 1px dashed var(--border-light);
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(148,163,184,.15), rgba(15,23,42,.25));
      color: var(--text-muted);
      font-size: 13px;
    }
    .meta { font-size: 12px; color: var(--text-muted); margin-top: -4px; }

    .step .badge {
      display: inline-block;
      border: 1px solid var(--border-light);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    ul { margin: 0; padding-left: 18px; }
    li { color: var(--text-muted); font-size: .92rem; line-height: 1.85; }

    .quote-card h4 { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    details summary {
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .item {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 12px;
    }
    .item .t { font-size: 12px; color: var(--text-muted); }
    .item .v { margin-top: 4px; font-weight: 700; }

    .cta {
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(130deg, transparent, var(--primary-glow));
    }

    .private .input { display: flex; gap: 8px; }
    .private input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border-light);
      background: var(--bg-card);
      color: var(--text-main);
    }
    .err { color: #ef4444; }

    footer {
      padding: 24px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .nav-links { display: none; }
      .gradient-text { font-size: 2.3rem; }
      .section-padding { padding: 58px 0; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#top" class="logo">
        <span>锦的创作导航</span>
        <div class="logo-dot"></div>
      </a>
      <div class="nav-actions">
        <div class="nav-links">
          <a href="#linksSec">账号</a>
          <a href="#portfolioSec">作品</a>
          <a href="#servicesSec">服务</a>
          <a href="#faqSec">FAQ</a>
          <a href="#contactSec">联系</a>
        </div>
        <button class="control-btn" id="themeToggle" aria-label="Toggle Theme">◐</button>
      </div>
    </div>
  </nav>

  <section id="top" class="intro">
    <div class="bg-decoration"></div>
    <div class="container">
      <div class="avatar-container">
        <img src="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=400&auto=format&fit=crop" alt="Avatar" class="avatar" />
        <div class="avatar-glow"></div>
      </div>
      <h1 id="title" class="gradient-text"></h1>
      <p id="subtitle" class="subtitle"></p>
      <p id="intro" class="subtitle" style="margin-top:6px"></p>
      <p id="quote" class="quote-top"></p>
    </div>
  </section>

  <section id="linksSec" class="section-padding"><div class="container"><h2>账号入口</h2><div id="links" class="grid"></div></div></section>
  <section id="portfolioSec" class="section-padding"><div class="container"><h2>作品墙</h2><div id="portfolio" class="grid"></div></div></section>
  <section id="servicesSec" class="section-padding"><div class="container"><h2>服务能力</h2><div id="services" class="grid"></div></div></section>
  <section class="section-padding"><div class="container"><h2>创作流程</h2><div id="process" class="grid"></div></div></section>
  <section class="section-padding"><div class="container"><h2>资源库</h2><div id="resources" class="grid"></div></div></section>
  <section class="section-padding"><div class="container"><h2>合作反馈</h2><div id="testimonials" class="grid"></div></div></section>
  <section id="faqSec" class="section-padding"><div class="container"><h2>常见问题</h2><div id="faq" class="grid"></div></div></section>
  <section id="contactSec" class="section-padding"><div class="container"><h2>联系方式</h2><div id="contacts" class="kpi"></div></div></section>
  <section class="section-padding"><div class="container"><div class="cta"><h2 id="ctaTitle"></h2><p id="ctaText" class="subtitle" style="max-width:none;margin-top:8px"></p></div></div></section>
  <section class="section-padding"><div class="container"><h2 id="privateHint">私密区</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="输入密码访问私密资料" /><button id="unlockBtn" class="btn">解锁</button></div><div id="privateContent" class="grid" style="margin-top:10px"></div></div></div></section>

  <footer>© 2026 锦的创作资源导航</footer>

  <script src="./assets/content.js"></script>
  <script src="./assets/app.js"></script>
  <script>
    const root = document.documentElement;
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
