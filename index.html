<!doctype html><html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>锦的创作资源导航</title>
<meta name="description" content="锦的创作资源导航：AI内容生产与多平台分发工作台" />
<style>
:root{--bg:#f5f0e7;--bg2:#efe6d8;--card:#fffdf8;--text:#2f2922;--muted:#7e7264;--line:#e5d8c4;--accent:#b07a45;--shadow:0 18px 46px rgba(80,58,32,.13)}
*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial;background:
radial-gradient(900px 500px at 10% -20%,#fff6e8 0%,transparent 60%),
radial-gradient(900px 500px at 90% 0%,#f7ebdb 0%,transparent 60%),
linear-gradient(180deg,var(--bg),var(--bg2))}
.container{max-width:1140px;margin:0 auto;padding:28px 18px 64px}
.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;padding:34px 30px;background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(255,247,232,.68));box-shadow:var(--shadow)}
.hero:before{content:"";position:absolute;right:-70px;top:-70px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,#efd6b5 0%,transparent 72%)}
h1{margin:0;font-family:"Times New Roman","Georgia","PingFang SC",serif;font-size:44px;letter-spacing:1px;font-weight:700}
.sub{margin-top:10px;color:var(--muted);font-size:15px}.intro{margin-top:8px;color:var(--muted);line-height:1.85}
.section{margin-top:28px}.section h2{margin:0 0 12px;font-size:21px;font-family:"Times New Roman","Georgia","PingFang SC",serif;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 8px 24px rgba(67,50,28,.08);transition:.25s}.card:hover{transform:translateY(-2px)}
.card h3{margin:0 0 7px;font-size:17px}.card p{margin:0 0 10px;color:var(--muted);line-height:1.6}
.btn{display:inline-block;text-decoration:none;border:1px solid #d6bea2;background:linear-gradient(180deg,#fff,#f7eddc);padding:8px 12px;border-radius:11px;color:#6f4a24;font-weight:600}
.btn.muted{opacity:.6}
.work .cover{height:150px;background:linear-gradient(145deg,#f4ecde,#efe3d1);border:1px dashed #ddc8ac;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden}
.work img{width:100%;height:100%;object-fit:cover}.placeholder{color:#a08f78;font-size:13px}
ul{margin:0;padding-left:18px;color:#6d6257;line-height:1.8}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.item .t{font-size:12px;color:#887b6e}.item .v{margin-top:5px;font-weight:700}
.private{display:grid;gap:10px}.input{display:flex;gap:8px}.input input{flex:1;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}
.err{color:#b02a2a}footer{margin-top:24px;color:#8a7b69;font-size:13px}
@media (max-width:640px){h1{font-size:34px}.hero{padding:24px}}
</style></head><body><main class="container">
<section class="hero"><h1 id="title"></h1><div id="subtitle" class="sub"></div><div id="intro" class="intro"></div></section>
<section class="section"><h2>账号入口</h2><div id="links" class="grid"></div></section>
<section class="section"><h2>作品墙</h2><div id="portfolio" class="grid"></div></section>
<section class="section"><h2>资源库</h2><div id="resources" class="grid"></div></section>
<section class="section"><h2>联系方式</h2><div id="contacts" class="kpi"></div></section>
<section class="section"><h2 id="privateHint">私密区</h2><div class="private"><div class="input"><input id="pwd" type="password" placeholder="输入密码访问私密资料"/><button id="unlockBtn" class="btn">解锁</button></div><div id="privateContent" class="grid"></div></div></section>
<footer>© 2026 锦的创作资源导航</footer></main>
<script src="./assets/content.js"></script><script src="./assets/app.js"></script>
</body></html>
